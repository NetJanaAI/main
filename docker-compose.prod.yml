version: '3.8'

services:
  # NetJana Unified SaaS Container
  # This container includes both the UI and the API 
  app:
    image: netjana-scraper:latest
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: netjana-prod
    restart: always
    # Cloud providers like Azure/Render will map their public ports to this EXPOSEd 3000
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVE_FRONTEND=true
      # Values should be provided via Cloud Provider dashboard secrets
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - HMAC_SECRET=${HMAC_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ROLE=api_only
    volumes:
      # Data persistence for the Regional Vault
      - netjana_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Isolated Auto-Scaling Scraper Tier
  scraper-worker:
    image: netjana-scraper:latest
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: netjana-scraper-worker
    restart: always
    command: npm run start:scraper
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ROLE=worker
    volumes:
      - netjana_data:/app/data

  # Dedicated Daemon for Webhook Delivery (Saves $ by separating from heavy Node Scraper)
  go-pusher:
    image: netjana-go-pusher:latest
    build: 
      context: ./go-pusher
      dockerfile: Dockerfile
    container_name: netjana-go-pusher-prod
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CONVOSPAN_WEBHOOK_URL=${CONVOSPAN_WEBHOOK_URL}
      - CONVOSPAN_API_KEY=${CONVOSPAN_API_KEY}
      - NETJANA_HMAC_SECRET=${NETJANA_HMAC_SECRET}
      - PUSHER_MAX_RETRIES=5
      - PUSHER_TIMEOUT_SEC=15

volumes:
  netjana_data:
